  <head>

    <title>Calculator Project</title>
    <link rel="stylesheet" href="./main.css"/>

  <body>

      <h1>My Calculator Project</h1>

        </div>
        <button>AC</button>
        <button>DEL</button>
        <button>%</button>
        <button>÷</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
        <button>x</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>-</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>+</button>
        <button>()</button>
        <button>0</button>
        <button>.</button>
        <button>=</button>

      <script type="module" src="/src/main.ts"></script>
    </main>
